name: ADH-广告订阅合并

# 修复：强制使用 Node.js 24 运行 Actions，解决 Node.js 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "仅构建，不提交 release"
        required: false
        default: "false"
      force:
        description: "忽略规则变化阈值"
        required: false
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ github.event.inputs.dry_run }}
      FORCE_PASS: ${{ github.event.inputs.force }}
    steps:
      - name: Checkout main (scripts & config)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout release (output branch)
        uses: actions/checkout@v4
        with:
          ref: release
          path: release
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Build rules
        env:
          OUTPUT_DIR: ${{ github.workspace }}/release
        run: |
          cd main
          python scripts/ADH-AD.py

      # --- 新增：提交统计文件到 main 分支 ---
      - name: Commit stats to main branch
        working-directory: main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 检查 stats 文件是否存在并添加
          if [ -f config/ADH_AD_stats.json ]; then
            git add config/ADH_AD_stats.json
            git diff --cached --quiet || git commit -m "chore: update ADH-AD stats $(date +'%Y-%m-%d %H:%M UTC')"
            git push origin main
            echo "✔ Stats file committed to main branch."
          else
            echo "⚠️ Stats file not found, skipping commit."
          fi
      # ----------------------------------------

      - name: Commit & Push to release
        if: env.DRY_RUN != 'true'
        working-directory: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 当前目录内容："
          ls -la
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add -A
          git diff --cached --quiet && echo "No changes to commit, skipping" && exit 0
          git commit -m "auto: update rules $(date +'%Y-%m-%d %H:%M UTC')"
          git push origin release

  cleanup:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete workflow runs older than 2 days
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 2
          keep_minimum_runs: 2
