name: ADH-广告订阅合并

permissions:
  contents: write
  actions: write

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "仅构建，不提交 release"
        required: false
        default: "false"
      force:
        description: "忽略规则变化阈值"
        required: false
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      FORCE_PASS: ${{ github.event.inputs.force || 'false' }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      DEBUG: "false"
    
    steps:
      - name: Checkout main (scripts & config)
        uses: actions/checkout@v5
        with:
          ref: main
          path: main
      
      - name: Checkout release (output branch)
        uses: actions/checkout@v5
        with:
          ref: release
          path: release
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: "pip"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml
      
      - name: Build rules
        run: |
          cd main
          python scripts/ADH-AD.py
      
      - name: Commit stats to main branch
        if: env.DRY_RUN != 'true'
        working-directory: main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f config/ADH_AD_stats.json ]; then
            git add config/ADH_AD_stats.json
            git diff --cached --quiet || git commit -m "chore: update ADH-AD stats $(date +'%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi
      
      - name: Copy output files to release
        if: env.DRY_RUN != 'true'
        run: |
          cp -f main/out/adguardhome.txt release/adguardhome.txt
          cp -f main/out/dnsmasq.conf release/dnsmasq.conf
          cp -f main/out/clash.yaml release/clash.yaml
          cp -f main/out/README.md release/README.md
      
      - name: Commit & Push to release
        if: env.DRY_RUN != 'true'
        working-directory: release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add -A
          git diff --cached --quiet && echo "No changes to commit, skipping" && exit 0
          git commit -m "auto: update rules $(date +'%Y-%m-%d %H:%M UTC')"
          git push origin release
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ADH-AD-rules
          path: main/out/
          retention-days: 7
  
  cleanup:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 2
          keep_minimum_runs: 2
