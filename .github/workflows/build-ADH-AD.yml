name: ADH-AD Build

permissions:
  contents: write
  actions: write

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run mode - build only, no commit"
        required: false
        default: "false"
      force:
        description: "Force mode - ignore threshold check"
        required: false
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      FORCE_PASS: ${{ github.event.inputs.force || 'false' }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      DEBUG: "false"
    
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v5
        with:
          ref: main
          path: main
      
      - name: Checkout release branch
        uses: actions/checkout@v5
        with:
          ref: release
          path: release
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: "pip"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml
      
      - name: Build rules
        env:
          OUTPUT_DIR: ${{ github.workspace }}/release
        run: |
          cd main
          python scripts/ADH-AD.py
      
      - name: Verify output files
        run: |
          echo "Checking output files..."
          ls -lh release/
          
          if [ ! -f "release/adguardhome.txt" ]; then
            echo "::error::adguardhome.txt not generated"
            exit 1
          fi
          if [ ! -f "release/dnsmasq.conf" ]; then
            echo "::error::dnsmasq.conf not generated"
            exit 1
          fi
          if [ ! -f "release/clash.yaml" ]; then
            echo "::error::clash.yaml not generated"
            exit 1
          fi
          if [ ! -f "release/README.md" ]; then
            echo "::error::README.md not generated"
            exit 1
          fi
          echo "All output files generated successfully"
      
      - name: Commit stats to main
        if: env.DRY_RUN != 'true'
        working-directory: main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f config/ADH_AD_stats.json ]; then
            git add config/ADH_AD_stats.json
            git diff --cached --quiet || git commit -m "chore: update ADH-AD stats $(date +'%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi
      
      - name: Commit to release
        if: env.DRY_RUN != 'true'
        working-directory: release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "auto: update rules $(date +'%Y-%m-%d %H:%M UTC')"
          git push origin release
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ADH-AD-rules
          path: release/
          retention-days: 7
  
  cleanup:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 2
          keep_minimum_runs: 2
